<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数据看板</title>
    <!-- PWA 全屏模式支持 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ED6C00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand: #ED6C00;
            --brand-dark: #c45a00;
            --brand-soft: rgba(237, 108, 0, 0.22);
            --brand-text-on-dark: #ffb366;
        }

        /* ===== 显示模式（深色大屏 · 品牌暖色分区） ===== */
        body.display-mode {
            background: #100d0a;
            color: #e8e0d8;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶栏：品牌强调条 */
        body.display-mode .header {
            background: linear-gradient(180deg, #3d2a1a 0%, #24180f 100%);
            padding: 10px 20px;
            border-bottom: 3px solid var(--brand);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        body.display-mode .header .time {
            font-size: 14px;
            color: #c4a882;
            white-space: nowrap;
            position: absolute;
            right: 40px;
        }

        body.display-mode .header h1 {
            font-size: 24px;
            color: #fff8f0;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.45), 0 0 24px var(--brand-soft);
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }

        body.display-mode .table-container {
            flex: 1;
            padding: 10px;
            overflow: auto;
            background: linear-gradient(180deg, #1a1510 0%, #12100c 100%);
        }

        body.display-mode table {
            border-collapse: collapse;
            table-layout: auto;
            min-width: 100%;
        }

        /* 目录栏（表头）：与顶栏区分的深棕灰 + 弱品牌边线 */
        body.display-mode thead th {
            background: linear-gradient(180deg, #2e241c 0%, #231a14 100%);
            color: var(--brand-text-on-dark);
            font-size: 14px;
            padding: 10px 8px;
            border: 1px solid rgba(237, 108, 0, 0.35);
            text-align: center;
            font-weight: 600;
            white-space: nowrap;
        }

        /* 数据区 */
        body.display-mode tbody td {
            font-size: 14px;
            padding: 8px 8px;
            border: 1px solid #2d2418;
            text-align: center;
            transition: background 0.3s;
            white-space: nowrap;
            color: #e8e0d8;
        }

        body.display-mode tbody tr:nth-child(even) td {
            background: #1a1612;
        }

        body.display-mode tbody tr:nth-child(odd) td {
            background: #14110e;
        }

        body.display-mode tbody tr:hover td {
            background: #252018;
        }

        body.display-mode tbody td:first-child {
            color: var(--brand-text-on-dark);
            font-weight: 600;
        }

        /* 项目状态 / 任务状态：按内容着色（大屏深色底） */
        body.display-mode tbody td.cell-status-ok {
            color: #69f0ae;
            font-weight: 600;
        }

        body.display-mode tbody td.cell-status-late {
            color: #ff8a80;
            font-weight: 600;
        }

        body.display-mode tbody td.cell-status-neutral {
            color: #ffffff;
        }

        body.display-mode tbody td:first-child.cell-status-ok,
        body.display-mode tbody td:first-child.cell-status-late,
        body.display-mode tbody td:first-child.cell-status-neutral {
            font-weight: 600;
        }

        body.display-mode .status-indicator {
            position: fixed;
            bottom: 5px;
            right: 10px;
            font-size: 10px;
            color: #5a4a38;
        }

        body.display-mode .status-indicator.connected {
            color: #7a9a6a;
        }

        /* ===== 全屏切换按钮 ===== */
        body.display-mode .fullscreen-btn {
            position: fixed;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            background: rgba(237, 108, 0, 0.2);
            border: 1px solid rgba(237, 108, 0, 0.45);
            border-radius: 4px;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }

        body.display-mode .fullscreen-btn:hover {
            background: rgba(237, 108, 0, 0.35);
        }

        body.display-mode .fullscreen-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--brand-text-on-dark);
        }

        /* ===== 编辑模式 ===== */
        body.edit-mode {
            background: #f2efe9;
            color: #333;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            min-height: 100vh;
        }

        body.edit-mode .toolbar {
            background: #fff;
            border-bottom: 2px solid var(--brand);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(237, 108, 0, 0.08);
        }

        body.edit-mode .toolbar h1 {
            font-size: 20px;
            color: #333;
            margin-right: auto;
        }

        body.edit-mode .toolbar input.title-input {
            font-size: 20px;
            color: #333;
            border: none;
            border-bottom: 2px solid transparent;
            background: transparent;
            outline: none;
            margin-right: auto;
            padding: 4px 8px;
        }

        body.edit-mode .toolbar input.title-input:hover {
            border-bottom-color: #ddd;
        }

        body.edit-mode .toolbar input.title-input:focus {
            border-bottom-color: var(--brand);
        }

        body.edit-mode .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        body.edit-mode .btn-primary {
            background: var(--brand);
            color: #fff;
        }

        body.edit-mode .btn-primary:hover {
            background: var(--brand-dark);
        }

        body.edit-mode .btn-danger {
            background: #e74c3c;
            color: #fff;
        }

        body.edit-mode .btn-danger:hover {
            background: #c0392b;
        }

        body.edit-mode .btn-success {
            background: #27ae60;
            color: #fff;
        }

        body.edit-mode .btn-success:hover {
            background: #219a52;
        }

        body.edit-mode .content {
            padding: 24px;
        }

        body.edit-mode table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        body.edit-mode thead th {
            background: linear-gradient(180deg, #faf6f2 0%, #f2ebe4 100%);
            color: #4a3528;
            font-size: 14px;
            padding: 12px 16px;
            border-bottom: 2px solid rgba(237, 108, 0, 0.35);
            text-align: left;
            font-weight: 600;
        }

        body.edit-mode tbody td {
            padding: 4px 8px;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        body.edit-mode tbody td input {
            width: 100%;
            border: none;
            padding: 8px;
            font-size: 14px;
            background: transparent;
            outline: none;
        }

        body.edit-mode tbody td input:focus {
            background: #fff8f0;
            border-radius: 4px;
        }

        /* 编辑页：项目状态 / 任务状态列（浅色底，「其他」用深字保证可读） */
        body.edit-mode tbody td.cell-status-ok input {
            color: #2e7d32;
            font-weight: 600;
        }

        body.edit-mode tbody td.cell-status-late input {
            color: #c62828;
            font-weight: 600;
        }

        body.edit-mode tbody td.cell-status-neutral input {
            color: #333;
            font-weight: 500;
        }

        body.edit-mode tbody tr:hover td {
            background: #f8fafc;
        }

        body.edit-mode .row-actions {
            text-align: center;
        }

        body.edit-mode .row-actions button {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        body.edit-mode .row-actions button:hover {
            background: #fde8e8;
        }

        body.edit-mode .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #999;
        }

        body.edit-mode .connection-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
        }

        body.edit-mode .connection-status .dot.connected {
            background: #27ae60;
        }

        body.edit-mode .info-bar {
            margin-top: 16px;
            padding: 12px 16px;
            background: #e8f0fe;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
        }

        body.edit-mode .info-bar code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode') || 'display';
        const isEditMode = mode === 'edit';
        const editToken = params.get('token') || '';
        const isProbablyLocalEditor = ['localhost', '127.0.0.1', '[::1]', '::1'].includes(location.hostname);

        document.body.className = isEditMode ? 'edit-mode' : 'display-mode';

        let ws = null;
        let tableData = null;

        async function fetchTableState() {
            try {
                const r = await fetch('/api/table-state', { cache: 'no-store' });
                if (!r.ok) return;
                const data = await r.json();
                if (data && Array.isArray(data.columns) && Array.isArray(data.rows)) {
                    tableData = data;
                    renderTable();
                }
            } catch (e) {
                console.warn('拉取表格数据失败', e);
            }
        }

        function showEditBanner(text) {
            let el = document.getElementById('editSecurityBanner');
            if (!el) {
                el = document.createElement('div');
                el.id = 'editSecurityBanner';
                el.style.cssText = 'margin:12px 24px;padding:12px;background:#fde8e8;color:#a82323;border-radius:8px;font-size:14px;line-height:1.5;';
                document.body.insertBefore(el, document.body.firstChild);
            }
            el.textContent = text;
        }

        function clearEditBanner() {
            const el = document.getElementById('editSecurityBanner');
            if (el) el.remove();
        }

        function connectWS() {
            const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${wsProtocol}//${location.host}`);

            ws.onopen = () => {
                console.log('WebSocket 已连接');
                if (isEditMode && editToken) {
                    ws.send(JSON.stringify({ type: 'auth', token: editToken }));
                }
                updateConnectionStatus(true);
            };

            ws.onmessage = (event) => {
                let msg;
                try {
                    msg = JSON.parse(event.data);
                } catch (e) {
                    console.warn('无法解析 WebSocket 消息', e);
                    return;
                }
                if (msg.type === 'authOk') {
                    clearEditBanner();
                    return;
                }
                if (msg.type === 'authFail') {
                    showEditBanner('编辑认证失败：' + (msg.message || '请核对服务端 DASHBOARD_EDIT_TOKEN 与地址栏 token 参数'));
                    return;
                }
                if (msg.type === 'error' && msg.code === 'FORBIDDEN') {
                    if (isEditMode) {
                        showEditBanner(msg.message || '服务器拒绝了此次修改（无写权限）');
                    }
                    return;
                }
                if (msg.type === 'init' || msg.type === 'update') {
                    tableData = msg.data;
                    renderTable();
                }
            };

            ws.onclose = () => {
                console.log('WebSocket 断开，3秒后重连...');
                updateConnectionStatus(false);
                setTimeout(connectWS, 3000);
            };

            ws.onerror = () => {
                updateConnectionStatus(false);
            };
        }

        function sendUpdate(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(msg));
            }
        }

        function updateConnectionStatus(connected) {
            const dot = document.querySelector('.dot');
            const statusText = document.querySelector('.status-text');
            const indicator = document.querySelector('.status-indicator');
            if (dot) dot.className = 'dot' + (connected ? ' connected' : '');
            if (statusText) statusText.textContent = connected ? '已连接' : '断开连接中...';
            if (indicator) indicator.className = 'status-indicator' + (connected ? ' connected' : '');
        }

        function renderTable() {
            if (!tableData) return;

            if (isEditMode) {
                renderEditMode();
            } else {
                renderDisplayMode();
            }
        }

        /** 表头名含「项目状态」「任务状态」的列按单元格文案着色 */
        function isProjectOrTaskStatusColumn(colName) {
            const s = String(colName || '');
            return s.includes('项目状态') || s.includes('任务状态');
        }

        function statusCellClass(colName, rawValue) {
            if (!isProjectOrTaskStatusColumn(colName)) return '';
            const v = String(rawValue == null ? '' : rawValue).trim();
            if (v === '正常') return 'cell-status-ok';
            if (v === '延迟') return 'cell-status-late';
            return 'cell-status-neutral';
        }

        function renderEditMode() {
            if (!document.querySelector('.toolbar')) {
                document.body.innerHTML = `
                    <div class="toolbar">
                        <input class="title-input" type="text" id="titleInput" placeholder="输入看板标题" />
                        <div class="connection-status">
                            <div class="dot"></div>
                            <span class="status-text">连接中...</span>
                        </div>
                        <button class="btn btn-success" onclick="addRow()">+ 添加行</button>
                    </div>
                    <div class="content">
                        <table id="editTable"></table>
                        <div class="info-bar">
                            💡 信息发布屏请打开 <code>http://（运行 start.bat 的电脑 IPv4）:3000/?mode=display</code>；本机编辑时可直接用 <code>http://${location.hostname}:3000/?mode=display</code>
                            ${!isProbablyLocalEditor && !editToken ? '<p style="margin-top:10px;color:#c0392b;">当前通过局域网 IP 打开编辑页且未带 <code>token</code> 参数时，修改可能无法保存。请在服务端设置 <code>DASHBOARD_EDIT_TOKEN</code> 后使用 <code>?mode=edit&amp;token=你的令牌</code>。</p>' : ''}
                        </div>
                    </div>
                `;
                document.getElementById('titleInput').addEventListener('input', (e) => {
                    sendUpdate({ type: 'updateTitle', title: e.target.value });
                });
            }

            document.getElementById('titleInput').value = tableData.title;

            const table = document.getElementById('editTable');
            let html = '<thead><tr>';
            tableData.columns.forEach(col => {
                html += `<th>${escapeHtml(col)}</th>`;
            });
            html += '<th style="width:50px">操作</th></tr></thead><tbody>';

            tableData.rows.forEach(row => {
                html += '<tr>';
                row.data.forEach((cell, colIdx) => {
                    const colName = tableData.columns[colIdx] || '';
                    const sc = statusCellClass(colName, cell);
                    const clsAttr = sc ? ` class="${sc}"` : '';
                    html += `<td${clsAttr}><input type="text" value="${escapeHtml(cell)}" 
                        onchange="cellChanged(${row.id}, ${colIdx}, this.value)"
                        onfocus="this.select()" /></td>`;
                });
                html += `<td class="row-actions"><button onclick="deleteRow(${row.id})" title="删除行">×</button></td>`;
                html += '</tr>';
            });

            html += '</tbody>';
            table.innerHTML = html;
        }

        function renderDisplayMode() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });

            const isFs = document.fullscreenElement || document.webkitFullscreenElement;
            const fsIcon = isFs
                ? '<svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>';

            let html = `
                <div class="fullscreen-btn" onclick="toggleFullscreen()" title="${isFs ? '退出全屏' : '全屏'}">${fsIcon}</div>
                <div class="header">
                    <h1>${escapeHtml(tableData.title)}</h1>
                    <div class="time">${timeStr}</div>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr>`;

            tableData.columns.forEach(col => {
                html += `<th>${escapeHtml(col)}</th>`;
            });
            html += '</tr></thead><tbody>';

            tableData.rows.forEach((row, idx) => {
                html += '<tr>';
                row.data.forEach((cell, colIdx) => {
                    const colName = tableData.columns[colIdx] || '';
                    const sc = statusCellClass(colName, cell);
                    const clsAttr = sc ? ` class="${sc}"` : '';
                    html += `<td${clsAttr}>${escapeHtml(cell)}</td>`;
                });
                html += '</tr>';
            });

            html += `</tbody></table></div>
                <div class="status-indicator">● 实时同步中</div>`;

            document.body.innerHTML = html;
        }

        function toggleFullscreen() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } else {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                }
            }
        }

        function cellChanged(rowId, colIndex, value) {
            sendUpdate({ type: 'update', rowId, colIndex, value });
        }

        function addRow() {
            sendUpdate({ type: 'addRow' });
        }

        function deleteRow(rowId) {
            sendUpdate({ type: 'deleteRow', rowId });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // 显示模式定时刷新时间
        if (!isEditMode) {
            setInterval(() => {
                if (tableData) renderDisplayMode();
            }, 1000);
        }

        // 先 HTTP 拉一份（大屏 WebSocket 常因代理/省电连不上，避免表体空白）
        fetchTableState();
        connectWS();
        if (!isEditMode) {
            setInterval(fetchTableState, 8000);
        }
    </script>
</body>
</html>
